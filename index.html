<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deshi Drip | Bangladeshi Streetwear</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; }
    .hero {
      height: 100vh;
      background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a9c');
      background-size: cover;
      background-position: center;
    }
    .product-card {
      transition: all 0.4s ease;
    }
    .product-card:hover {
      transform: translateY(-8px);
    }
    .product-card:hover img {
      transform: scale(1.08);
    }
    .nav-link {
      position: relative;
    }
    .nav-link:after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -2px;
      left: 0;
      background-color: black;
      transition: width 0.3s;
    }
    .nav-link:hover:after {
      width: 100%;
    }
  </style>
</head>
<body class="bg-white text-black">

  <!-- Navbar - Zara Style -->
  <nav class="border-b sticky top-0 bg-white z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-3xl font-bold tracking-tight">DESHI DRIP</h1>
      
      <div class="flex gap-10 text-sm font-medium">
        <a href="#shop" class="nav-link">SHOP</a>
        <a href="#" class="nav-link">NEW DROPS</a>
        <a href="#" class="nav-link">KURTAS</a>
        <a href="#" class="nav-link">STREETWEAR</a>
      </div>

      <div class="flex items-center gap-6">
        <button onclick="toggleCart()" class="relative">
          <i class="fa-solid fa-bag-shopping text-xl"></i>
          <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero Banner -->
  <section class="hero flex items-center justify-center text-white text-center">
    <div>
      <h2 class="text-6xl md:text-7xl font-light tracking-widest mb-4">DESHI DRIP</h2>
      <p class="text-xl md:text-2xl tracking-wide">Rooted in Bangladesh • Styled for the World</p>
      <a href="#shop" class="mt-10 inline-block border border-white text-white px-12 py-4 text-sm tracking-widest hover:bg-white hover:text-black transition">
        SHOP NOW
      </a>
    </div>
  </section>

  <!-- Shop Section -->
  <section id="shop" class="max-w-7xl mx-auto px-6 py-16">
    <h2 class="text-3xl font-medium text-center mb-12">Latest Collection</h2>
    
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8" id="products">
      <!-- JS will fill this -->
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-black text-white py-16">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h2 class="text-3xl font-bold mb-6">Deshi Drip</h2>
      <p class="mb-8">Modern Bangladeshi Streetwear</p>
      
      <a href="https://wa.me/8801909738567" target="_blank"
         class="inline-flex items-center gap-3 bg-white text-black px-8 py-4 rounded-full font-medium hover:bg-gray-200">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
        ORDER VIA WHATSAPP
      </a>

      <p class="mt-12 text-gray-500 text-sm">© 2026 Deshi Drip. All Rights Reserved.</p>
    </div>
  </footer>

  <!-- Cart Modal -->
  <div id="cart-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center">
    <div class="bg-white w-full max-w-lg mx-4 rounded-xl p-8 text-black">
      <h3 class="text-2xl font-medium mb-6">Your Cart</h3>
      <div id="cart-items" class="space-y-6"></div>
      <div class="border-t pt-6 mt-8">
        <p class="flex justify-between text-lg"><span>Total</span> <span id="cart-total" class="font-medium">0৳</span></p>
      </div>
      <button onclick="checkout()" class="w-full bg-black text-white py-4 mt-8 text-sm tracking-widest">
        PROCEED TO WHATSAPP ORDER
      </button>
    </div>
  </div>

  <script>
    const products = [
      { id:1, name:"Essential Black Hoodie", price:1699, img:"https://images.unsplash.com/photo-1556821840-3a63f95609a7" },
      { id:2, name:"Bengal Script Tee", price:899, img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" },
      { id:3, name:"Linen Panjabi (Beige)", price:2199, img:"https://images.unsplash.com/photo-1595341888016-8a4f0f8f8f8f" },
      { id:4, name:"Cargo Joggers", price:1399, img:"https://images.unsplash.com/photo-1586790170083-2f9ceadc732d" },
      { id:5, name:"Dhaka Oversized Shirt", price:1499, img:"https://images.unsplash.com/photo-1622445275576-721325763afe" },
      { id:6, name:"Rickshaw Graphic Tee", price:899, img:"https://images.unsplash.com/photo-1585487000160-6eb1f3b3c7b7" }
    ];

    let cart = [];

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = products.map(p => `
        <div class="product-card group cursor-pointer">
          <div class="overflow-hidden bg-gray-100">
            <img src="${p.img}" class="w-full aspect-square object-cover transition-transform duration-500 group-hover:scale-105" />
          </div>
          <div class="mt-4 text-center">
            <h3 class="font-medium">${p.name}</h3>
            <p class="text-gray-600 mt-1">${p.price}৳</p>
            <button onclick="addToCart(${p.id}, event)" 
                    class="mt-4 w-full border border-black py-3 text-sm hover:bg-black hover:text-white transition">
              ADD TO CART
            </button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(id, e) {
      const product = products.find(p => p.id === id);
      cart.push(product);
      document.getElementById('cart-count').textContent = cart.length;
      
      // Simple animation feedback
      const btn = e.target;
      btn.textContent = "ADDED ✓";
      setTimeout(() => btn.textContent = "ADD TO CART", 1200);
    }

    function toggleCart() {
      document.getElementById('cart-modal').classList.toggle('hidden');
      renderCart();
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      const total = cart.reduce((sum, item) => sum + item.price, 0);
      
      container.innerHTML = cart.map((item, i) => `
        <div class="flex gap-4">
          <img src="${item.img}" class="w-20 h-20 object-cover">
          <div class="flex-1">
            <p>${item.name}</p>
            <p class="text-gray-600">${item.price}৳</p>
          </div>
          <button onclick="removeFromCart(${i})" class="text-red-500">Remove</button>
        </div>
      `).join('');
      
      document.getElementById('cart-total').textContent = total + "৳";
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      document.getElementById('cart-count').textContent = cart.length;
      renderCart();
    }

    function checkout() {
      if (cart.length === 0) return;
      const message = `Hello Deshi Drip!\n\nMy Order:\n` + 
        cart.map(item => `• ${item.name} - ${item.price}৳`).join('\n') +
        `\n\nTotal: ${cart.reduce((sum, i) => sum + i.price, 0)}৳`;
      
      window.open(`https://wa.me/8801909738567?text=${encodeURIComponent(message)}`);
    }

    renderProducts();
  </script>
</body>
</html>
